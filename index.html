<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>North Port CAD Feed</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root {
    --bg:      #07111e;
    --surface: #0c1a2a;
    --border:  #1a3550;
    --border2: #2a5070;
    --accent:  #00d4ff;
    --accent2: #00aadd;
    --red:     #ff3a3a;
    --red2:    #cc1010;
    --amber:   #ffbb00;
    --green:   #00ff88;
    --text:    #c8e0f4;
    --text2:   #e8f4ff;
    --muted:   #5a7a96;
    --dim:     #2a4a66;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘Barlow Condensed’, sans-serif;
min-height: 100vh;
overflow-x: hidden;
-webkit-font-smoothing: antialiased;
}

/* Grid background */
body::before {
content: ‘’;
position: fixed; inset: 0;
background-image:
linear-gradient(rgba(0,180,255,0.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,180,255,0.04) 1px, transparent 1px);
background-size: 40px 40px;
pointer-events: none; z-index: 0;
}

/* Scanlines */
body::after {
content: ‘’;
position: fixed; inset: 0;
background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
pointer-events: none; z-index: 9998;
}

/* Vignette */
.vignette {
position: fixed; inset: 0;
background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.4) 100%);
pointer-events: none; z-index: 9997;
}

/* ===== HEADER ===== */
header {
position: sticky; top: 0; z-index: 1000;
background: linear-gradient(180deg, #0a1828 0%, #0c1e30 100%);
border-bottom: 1px solid var(–border2);
padding: 10px 14px;
box-shadow: 0 2px 30px rgba(0,180,255,0.07);
}

header::before {
content: ‘’;
position: absolute; top: 0; left: 0; right: 0; height: 2px;
background: linear-gradient(90deg, transparent, var(–accent), var(–red), var(–accent), transparent);
animation: topline 4s ease-in-out infinite;
}

@keyframes topline { 0%,100%{opacity:0.5} 50%{opacity:1} }

.header-row1 { display: flex; align-items: center; gap: 10px; }

.header-row2 {
display: flex; align-items: center; justify-content: flex-end;
gap: 8px; margin-top: 8px; padding-top: 8px;
border-top: 1px solid var(–border);
}

.brand { display: flex; align-items: center; gap: 10px; min-width: 0; }

.brand-shield {
width: 34px; height: 34px; flex-shrink: 0;
background: linear-gradient(135deg, var(–red2), var(–red));
clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
display: flex; align-items: center; justify-content: center;
font-size: 15px;
animation: shield-pulse 2.5s ease-in-out infinite;
}

@keyframes shield-pulse {
0%,100% { box-shadow: 0 0 16px rgba(255,32,32,0.5), 0 0 40px rgba(255,32,32,0.2); }
50%      { box-shadow: 0 0 24px rgba(255,32,32,0.8), 0 0 60px rgba(255,32,32,0.4); }
}

.brand-text {
font-family: ‘Orbitron’, sans-serif; font-weight: 900;
font-size: 14px; letter-spacing: 3px; color: var(–text2);
text-shadow: 0 0 20px rgba(0,212,255,0.4); white-space: nowrap;
}

.brand-sub {
font-family: ‘Share Tech Mono’, monospace;
font-size: 7px; letter-spacing: 2px; color: var(–muted);
margin-top: 1px; white-space: nowrap;
}

.live-pill {
display: flex; align-items: center; gap: 5px;
background: rgba(0,255,136,0.06); border: 1px solid rgba(0,255,136,0.3);
padding: 4px 8px; font-family: ‘Share Tech Mono’, monospace;
font-size: 8px; letter-spacing: 2px; color: var(–green);
text-shadow: 0 0 8px var(–green); box-shadow: 0 0 12px rgba(0,255,136,0.08);
}

.live-dot {
width: 5px; height: 5px; background: var(–green); border-radius: 50%;
box-shadow: 0 0 6px var(–green); animation: blink 0.8s step-end infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

#clock {
font-family: ‘Orbitron’, sans-serif; font-size: 13px; font-weight: 600;
color: var(–accent); letter-spacing: 2px;
text-shadow: 0 0 12px rgba(0,212,255,0.6);
}

.refresh-btn {
background: rgba(0,180,255,0.05); border: 1px solid var(–border2);
color: var(–muted); font-family: ‘Share Tech Mono’, monospace;
font-size: 14px; padding: 5px 10px; cursor: pointer; transition: all 0.2s; line-height: 1;
}
.refresh-btn:hover, .refresh-btn:active {
border-color: var(–accent); color: var(–accent);
box-shadow: 0 0 12px rgba(0,212,255,0.2);
}
.refresh-btn.spinning { animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== STATS ===== */
.stats-grid {
display: grid; grid-template-columns: repeat(4, 1fr);
background: var(–surface); border-bottom: 1px solid var(–border2);
position: relative; z-index: 1;
}

.stat {
padding: 10px 6px; text-align: center;
border-right: 1px solid var(–border); position: relative;
}
.stat:last-child { border-right: none; }

.stat-num {
font-family: ‘Orbitron’, sans-serif; font-size: 28px; font-weight: 900;
line-height: 1; color: var(–accent);
text-shadow: 0 0 20px rgba(0,212,255,0.5); transition: all 0.4s;
}
.stat-num.red   { color: var(–red);   text-shadow: 0 0 20px rgba(255,32,32,0.6); }
.stat-num.amber { color: var(–amber); text-shadow: 0 0 20px rgba(255,170,0,0.5); }
.stat-num.green { color: var(–green); text-shadow: 0 0 20px rgba(0,255,136,0.5); }

.stat-label {
font-family: ‘Share Tech Mono’, monospace; font-size: 7px;
letter-spacing: 2px; color: var(–muted); margin-top: 3px; text-transform: uppercase;
}

/* ===== MAP ===== */
.map-section { border-bottom: 1px solid var(–border2); position: relative; z-index: 1; }

.map-header {
display: flex; align-items: center; justify-content: space-between;
padding: 7px 14px; background: rgba(0,10,20,0.9); border-bottom: 1px solid var(–border);
}

.map-title {
font-family: ‘Orbitron’, sans-serif; font-size: 8px; font-weight: 600;
letter-spacing: 3px; color: var(–accent2); text-transform: uppercase;
}

.map-legend { display: flex; gap: 12px; align-items: center; }

.legend-item {
display: flex; align-items: center; gap: 5px;
font-family: ‘Share Tech Mono’, monospace; font-size: 8px;
letter-spacing: 1px; color: var(–muted);
}

.legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

#map { height: 260px; width: 100%; background: #020810; z-index: 1; }

.leaflet-tile-pane { filter: brightness(0.5) saturate(0.4) hue-rotate(200deg) contrast(1.05); }
.leaflet-control-zoom { border: 1px solid var(–border2) !important; border-radius: 0 !important; }
.leaflet-control-zoom a { background: #04101e !important; color: var(–accent) !important; border-color: var(–border2) !important; border-radius: 0 !important; }
.leaflet-popup-content-wrapper { background: rgba(10,25,45,0.98) !important; border: 1px solid var(–border2) !important; border-radius: 0 !important; color: var(–text) !important; box-shadow: 0 4px 30px rgba(0,0,0,0.6), 0 0 20px rgba(0,180,255,0.08) !important; }
.leaflet-popup-tip { background: #040c18 !important; }
.leaflet-popup-content { font-family: ‘Barlow Condensed’, sans-serif !important; font-size: 12px !important; margin: 10px 14px !important; line-height: 1.5 !important; }
.popup-type { font-family:‘Orbitron’,sans-serif; font-size:11px; font-weight:700; color:var(–text2); margin-bottom:4px; letter-spacing:1px; }
.popup-addr { color:var(–muted); font-size:10px; font-family:‘Share Tech Mono’,monospace; }
.popup-time { color:var(–accent); font-size:9px; font-family:‘Share Tech Mono’,monospace; margin-top:5px; letter-spacing:1px; }

/* ===== FILTER TABS ===== */
.filter-bar {
display: flex; background: var(–surface); border-bottom: 1px solid var(–border2);
overflow-x: auto; scrollbar-width: none; position: relative; z-index: 1;
}
.filter-bar::-webkit-scrollbar { display: none; }

.tab {
flex: 1; min-width: 60px; padding: 9px 4px;
background: transparent; border: none; border-bottom: 2px solid transparent;
color: var(–muted); font-family: ‘Share Tech Mono’, monospace;
font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase;
cursor: pointer; transition: all 0.2s; white-space: nowrap;
}

.tab.active {
color: var(–accent); border-bottom-color: var(–accent);
background: rgba(0,212,255,0.04);
text-shadow: 0 0 8px rgba(0,212,255,0.4);
}

/* ===== STATUS BAR ===== */
#status-bar {
font-family: ‘Share Tech Mono’, monospace; font-size: 8px;
letter-spacing: 2px; padding: 5px 14px; text-align: center;
display: none; position: relative; z-index: 1;
}
#status-bar.warn  { display:block; background:rgba(255,170,0,0.06); border-bottom:1px solid rgba(255,170,0,0.2); color:var(–amber); }
#status-bar.error { display:block; background:rgba(255,32,32,0.06); border-bottom:1px solid rgba(255,32,32,0.2); color:var(–red); }
#status-bar.good  { display:block; background:rgba(0,255,136,0.04); border-bottom:1px solid rgba(0,255,136,0.15); color:var(–green); }

/* ===== INCIDENT LIST ===== */
#incident-list { padding-bottom: 40px; position: relative; z-index: 1; }

.state-screen {
display: flex; flex-direction: column; align-items: center;
justify-content: center; min-height: 200px; gap: 14px;
color: var(–muted); font-family: ‘Share Tech Mono’, monospace;
font-size: 10px; letter-spacing: 3px;
}

.spinner {
width: 28px; height: 28px; border: 1px solid var(–border2);
border-top-color: var(–accent); border-radius: 50%;
animation: spin 0.7s linear infinite;
box-shadow: 0 0 12px rgba(0,212,255,0.2);
}

.inc-card {
display: flex; gap: 12px; align-items: flex-start;
padding: 12px 14px; border-bottom: 1px solid rgba(13,32,53,0.8);
border-left: 2px solid transparent; transition: all 0.15s;
animation: fadein 0.3s ease; cursor: pointer; position: relative;
}

@keyframes fadein { from { opacity:0; transform:translateX(-6px); } to { opacity:1; transform:none; } }

.inc-card:active { background: rgba(0,212,255,0.03); }
.inc-card.is-today { border-left-color: var(–red); background: rgba(255,58,58,0.04); }
.inc-card.is-older { opacity: 0.7; }
.inc-card.highlighted { background: rgba(0,212,255,0.05) !important; border-left-color: var(–accent) !important; opacity: 1 !important; }

.inc-icon {
width: 38px; height: 38px;
display: flex; align-items: center; justify-content: center;
font-size: 17px; flex-shrink: 0; border: 1px solid; position: relative;
}

.inc-icon::before, .inc-icon::after {
content: ‘’; position: absolute;
width: 6px; height: 6px; border-color: inherit; border-style: solid; opacity: 0.4;
}
.inc-icon::before { top:-1px; left:-1px; border-width:1px 0 0 1px; }
.inc-icon::after  { bottom:-1px; right:-1px; border-width:0 1px 1px 0; }

.icon-fire    { background:rgba(255,100,0,0.08);  border-color:rgba(255,100,0,0.4); }
.icon-medical { background:rgba(255,32,32,0.08);  border-color:rgba(255,32,32,0.35); }
.icon-traffic { background:rgba(0,180,255,0.06);  border-color:rgba(0,180,255,0.3); }
.icon-alarm   { background:rgba(255,170,0,0.06);  border-color:rgba(255,170,0,0.3); }
.icon-other   { background:rgba(60,100,140,0.06); border-color:rgba(60,100,140,0.3); }

.inc-body { flex: 1; min-width: 0; }

.inc-type {
font-family: ‘Orbitron’, sans-serif; font-size: 11px; font-weight: 600;
color: var(–text2); white-space: nowrap; overflow: hidden;
text-overflow: ellipsis; letter-spacing: 0.5px;
}

.inc-addr {
font-family: ‘Share Tech Mono’, monospace; font-size: 9px;
color: var(–muted); margin-top: 4px; white-space: nowrap;
overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.5px;
}

.inc-addr.no-addr { color: var(–dim); font-style: italic; }

.inc-case {
font-family: ‘Share Tech Mono’, monospace; font-size: 7px;
color: var(–dim); margin-top: 4px; letter-spacing: 1px;
}

.inc-meta { text-align: right; flex-shrink: 0; }

.inc-time {
font-family: ‘Orbitron’, sans-serif; font-size: 11px; font-weight: 600;
color: var(–accent); letter-spacing: 1px;
text-shadow: 0 0 8px rgba(0,212,255,0.4);
}

.inc-date {
font-family: ‘Share Tech Mono’, monospace; font-size: 7px;
color: var(–muted); margin-top: 2px; letter-spacing: 1px;
}

.status-badge {
display: inline-block; font-family: ‘Share Tech Mono’, monospace;
font-size: 6px; letter-spacing: 1.5px; padding: 2px 5px;
margin-top: 4px; text-transform: uppercase;
}
.badge-today { background:rgba(255,32,32,0.12); color:var(–red); border:1px solid rgba(255,32,32,0.3); text-shadow:0 0 6px rgba(255,32,32,0.5); }
.badge-older { background:rgba(30,50,80,0.3); color:var(–muted); border:1px solid var(–border); }

#last-updated {
text-align: center; font-family: ‘Share Tech Mono’, monospace;
font-size: 7px; color: var(–muted); letter-spacing: 2px; padding: 12px;
position: relative; z-index: 1;
}

.source-note {
text-align: center; font-family: ‘Share Tech Mono’, monospace;
font-size: 7px; color: rgba(42,74,102,0.5); letter-spacing: 1px;
padding: 0 14px 20px; position: relative; z-index: 1;
}
.source-note a { color: rgba(0,180,255,0.4); text-decoration: none; }
</style>

</head>
<body>
<div class="vignette"></div>

<header>
  <div class="header-row1">
    <div class="brand">
      <div class="brand-shield">&#x1F6A8;</div>
      <div>
        <div class="brand-text">NORTH PORT CAD</div>
        <div class="brand-sub">NPFD // SARASOTA CO. 911 DISPATCH</div>
      </div>
    </div>
  </div>
  <div class="header-row2">
    <div class="live-pill"><div class="live-dot"></div>ONLINE</div>
    <div id="clock">--:--:--</div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadIncidents()">&#x21BB;</button>
  </div>
</header>

<div class="stats-grid">
  <div class="stat"><div class="stat-num red"   id="s-today">--</div><div class="stat-label">Today</div></div>
  <div class="stat"><div class="stat-num amber"  id="s-fire">--</div><div class="stat-label">Fire</div></div>
  <div class="stat"><div class="stat-num"        id="s-traffic">--</div><div class="stat-label">Traffic</div></div>
  <div class="stat"><div class="stat-num green"  id="s-alarm">--</div><div class="stat-label">Alarms</div></div>
</div>

<div class="map-section">
  <div class="map-header">
    <div class="map-title">North Port, FL</div>
    <div class="map-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#ff2020;box-shadow:0 0 4px #ff2020"></div>TODAY</div>
      <div class="legend-item"><div class="legend-dot" style="background:#2a4a66"></div>PRIOR</div>
    </div>
  </div>
  <div id="map"></div>
</div>

<div class="filter-bar">
  <button class="tab active" onclick="setFilter('all',this)">All</button>
  <button class="tab" onclick="setFilter('today',this)">Today</button>
  <button class="tab" onclick="setFilter('fire',this)">Fire</button>
  <button class="tab" onclick="setFilter('medical',this)">Medical</button>
  <button class="tab" onclick="setFilter('traffic',this)">Traffic</button>
  <button class="tab" onclick="setFilter('alarm',this)">Alarms</button>
</div>

<div id="status-bar"></div>
<div id="incident-list">
  <div class="state-screen"><div class="spinner"></div><span>ACQUIRING FEED...</span></div>
</div>
<div id="last-updated"></div>
<div class="source-note">SRC: <a href="https://dispatchreporting.scgov.net" target="_blank">dispatchreporting.scgov.net</a> // NPFD FILTER ACTIVE</div>

<script>
  var WORKER_URL = "https://pulsepoint-proxy.yanks126.workers.dev";

  function tick() {
    document.getElementById("clock").textContent =
      new Date().toLocaleTimeString("en-US", {hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:false});
  }
  setInterval(tick, 1000); tick();

  var NP_LAT = 27.0447, NP_LNG = -82.1426;
  var map = L.map("map", {center:[NP_LAT,NP_LNG], zoom:12, zoomControl:true, attributionControl:false});
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {maxZoom:18}).addTo(map);

  function makeIcon(bg, glow, emoji) {
    return L.divIcon({
      className: "",
      html: "<div style=\"width:28px;height:28px;background:" + bg + ";border:1px solid " + glow + ";clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;box-shadow:0 0 12px " + glow + "\"><span style=\"font-size:11px;line-height:1\">" + emoji + "</span></div>",
      iconSize:[28,28], iconAnchor:[14,14], popupAnchor:[0,-16]
    });
  }

  var ICONS = {
    fire_today:    makeIcon("rgba(255,80,0,0.9)",   "rgba(255,100,0,0.8)",  "&#x1F525;"),
    traffic_today: makeIcon("rgba(0,160,255,0.9)",  "rgba(0,200,255,0.8)",  "&#x1F697;"),
    alarm_today:   makeIcon("rgba(255,180,0,0.9)",  "rgba(255,200,0,0.8)",  "&#x26A0;"),
    other_today:   makeIcon("rgba(60,120,180,0.9)", "rgba(80,150,220,0.8)", "&#x26A1;"),
    fire_older:    makeIcon("rgba(80,40,0,0.6)",    "rgba(120,60,0,0.4)",   "&#x1F525;"),
    traffic_older: makeIcon("rgba(0,60,100,0.6)",   "rgba(0,100,150,0.4)",  "&#x1F697;"),
    alarm_older:   makeIcon("rgba(80,60,0,0.6)",    "rgba(120,100,0,0.4)",  "&#x26A0;"),
    other_older:   makeIcon("rgba(20,40,60,0.6)",   "rgba(40,70,100,0.4)",  "&#x26A1;"),
  };

  var mapMarkers = [];
  var allIncidents = [];
  var currentFilter = "all";
  var geocodeCache = {};
  var idCounter = 0;

  function category(t) {
    if (!t) return "other";
    t = t.toUpperCase();
    if (/MEDICAL|EMS|CARDIAC|CPR|TRAUMA|RESCUE MEDICAL|FALL|SICK|INJURY|ALS|BLS|OVERDOSE|SEIZ|DIABET|ALLERGIC|UNCONSCIOUS|HEMORRHAGE|STROKE|CHEST/.test(t)) return "medical";
    if (/FIRE|BRUSH|EXPLOSION|STRUCTURE|SMOKE|HAZMAT|BURNING|OUTSIDE FIRE|ELECTRICAL/.test(t)) return "fire";
    if (/TRAFFIC|CRASH|COLLISION|ACCIDENT|MVC/.test(t)) return "traffic";
    if (/ALARM|CARBON|MONOXIDE/.test(t)) return "alarm";
    return "other";
  }

  function hasAddress(location) {
    if (!location || location.trim().length < 4) return false;
    var l = location.trim().toUpperCase();
    if (/^(GRID|REDACTED|UNKNOWN|N\/A|NONE)$/.test(l)) return false;
    return /\d/.test(l);
  }

  var CAT_EMOJI = {fire:"&#x1F525;", medical:"&#x1FA7A;", traffic:"&#x1F697;", alarm:"&#x26A0;", other:"&#x26A1;"};
  var CAT_CLS   = {fire:"icon-fire", medical:"icon-medical", traffic:"icon-traffic", alarm:"icon-alarm", other:"icon-other"};

  function getTodayStr() {
    var d = new Date();
    var mm = String(d.getMonth()+1).padStart(2,"0");
    var dd = String(d.getDate()).padStart(2,"0");
    var yy = String(d.getFullYear()).slice(-2);
    return mm + "/" + dd + "/" + yy;
  }

  function setStatus(msg, cls) {
    var el = document.getElementById("status-bar");
    el.className = cls || "";
    el.textContent = msg;
  }

  function parseDispatchHTML(html) {
    var parser = new DOMParser();
    var doc = parser.parseFromString(html, "text/html");
    var rows = doc.querySelectorAll("tr");
    var incidents = [];
    var currentDate = "";
    var todayStr = getTodayStr();

    rows.forEach(function(row) {
      var fullText = row.textContent.trim();
      if (fullText.indexOf("Event Date:") !== -1) {
        var match = fullText.match(/(\d{2}\/\d{2}\/\d{2})/);
        if (match) currentDate = match[1];
        return;
      }

      var cells = row.querySelectorAll("td");
      if (cells.length < 7) return;

      var time     = cells[0].textContent.trim() || cells[1].textContent.trim();
      var event    = cells[2].textContent.trim();
      var location = cells[3].textContent.trim();
      var grid     = cells[4].textContent.trim();
      var zone     = cells[5].textContent.trim();
      var caseNum  = cells[6].textContent.trim();

      if (!caseNum || caseNum.indexOf("NPFD") === -1) return;
      if (!event) return;

      incidents.push({
        date:      currentDate,
        time:      time,
        eventType: event,
        location:  location,
        grid:      grid,
        zone:      zone,
        caseNum:   caseNum,
        isToday:   currentDate === todayStr,
        mappable:  hasAddress(location),
        _id:       "inc" + (++idCounter)
      });
    });

    return incidents;
  }

  async function geocode(address) {
    if (geocodeCache[address]) return geocodeCache[address];
    try {
      var q = encodeURIComponent(address + ", Sarasota County, FL, USA");
      var r = await fetch("https://nominatim.openstreetmap.org/search?q=" + q + "&format=json&limit=1", {
        headers: {"Accept-Language":"en", "User-Agent":"NorthPortCAD/1.0"}
      });
      var data = await r.json();
      if (data && data[0]) {
        var result = {lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon)};
        geocodeCache[address] = result;
        return result;
      }
    } catch(e) {}
    var result = {lat: NP_LAT + (Math.random()-0.5)*0.06, lng: NP_LNG + (Math.random()-0.5)*0.08};
    geocodeCache[address] = result;
    return result;
  }

  async function renderMap(incidents) {
    mapMarkers.forEach(function(m) { map.removeLayer(m); });
    mapMarkers = [];

    var mappable = incidents.filter(function(i) { return i.mappable; });
    if (!mappable.length) return;

    var bounds = [];
    for (var i = 0; i < mappable.length; i++) {
      var inc = mappable[i];
      if (!inc._lat) {
        var c = await geocode(inc.location);
        inc._lat = c.lat;
        inc._lng = c.lng;
      }
      var cat = category(inc.eventType);
      var suffix = inc.isToday ? "_today" : "_older";
      var icon = ICONS[cat + suffix] || ICONS["other_today"];

      var marker = L.marker([inc._lat, inc._lng], {icon: icon})
        .bindPopup(
          "<div class=\"popup-type\">" + inc.eventType + "</div>" +
          "<div class=\"popup-addr\">" + inc.location + "</div>" +
          "<div class=\"popup-time\">" + inc.date + " // " + inc.time + " // " + inc.caseNum + "</div>"
        )
        .addTo(map);

      (function(id) {
        marker._incId = id;
        marker.on("click", function() {
          document.querySelectorAll(".inc-card").forEach(function(c) { c.classList.remove("highlighted"); });
          var card = document.getElementById("card-" + id);
          if (card) { card.classList.add("highlighted"); card.scrollIntoView({behavior:"smooth", block:"nearest"}); }
        });
      })(inc._id);

      mapMarkers.push(marker);
      bounds.push([inc._lat, inc._lng]);
    }

    if (bounds.length) {
      try { map.fitBounds(bounds, {padding:[28,28], maxZoom:14}); }
      catch(e) { map.setView([NP_LAT, NP_LNG], 12); }
    }
  }

  function renderList(incidents) {
    var el = document.getElementById("incident-list");
    if (!incidents.length) {
      el.innerHTML = "<div class=\"state-screen\"><span style=\"font-size:28px\">&#x1F4E1;</span><span>NO NPFD INCIDENTS IN FEED</span></div>";
      renderMap([]);
      return;
    }

    el.innerHTML = incidents.map(function(inc) {
      var cat = category(inc.eventType);
      var addrHtml = inc.mappable
        ? "<div class=\"inc-addr\">&#x25B8; " + inc.location + "</div>"
        : "<div class=\"inc-addr no-addr\">Address not disclosed</div>";
      return "<div class=\"inc-card " + (inc.isToday ? "is-today" : "is-older") + "\" id=\"card-" + inc._id + "\" onclick=\"focusOnMap('" + inc._id + "')\">" +
        "<div class=\"inc-icon " + CAT_CLS[cat] + "\">" + CAT_EMOJI[cat] + "</div>" +
        "<div class=\"inc-body\">" +
          "<div class=\"inc-type\">" + inc.eventType + "</div>" +
          addrHtml +
          "<div class=\"inc-case\">" + inc.caseNum + (inc.zone ? " // " + inc.zone : "") + "</div>" +
        "</div>" +
        "<div class=\"inc-meta\">" +
          "<div class=\"inc-time\">" + inc.time + "</div>" +
          "<div class=\"inc-date\">" + inc.date + "</div>" +
          "<div class=\"status-badge " + (inc.isToday ? "badge-today" : "badge-older") + "\">" + (inc.isToday ? "TODAY" : "PRIOR") + "</div>" +
        "</div>" +
      "</div>";
    }).join("");

    renderMap(incidents);
  }

  function focusOnMap(id) {
    var inc = null;
    for (var i = 0; i < allIncidents.length; i++) {
      if (allIncidents[i]._id === id) { inc = allIncidents[i]; break; }
    }
    if (!inc) return;
    if (inc.mappable && inc._lat) {
      document.getElementById("map").scrollIntoView({behavior:"smooth", block:"start"});
      map.setView([inc._lat, inc._lng], 15, {animate:true});
      mapMarkers.forEach(function(m) { if (m._incId === id) m.openPopup(); });
    }
    document.querySelectorAll(".inc-card").forEach(function(c) { c.classList.remove("highlighted"); });
    var card = document.getElementById("card-" + id);
    if (card) card.classList.add("highlighted");
  }

  function updateStats(list) {
    var today   = list.filter(function(i) { return i.isToday; }).length;
    var fire    = list.filter(function(i) { return category(i.eventType) === "fire"; }).length;
    var traffic = list.filter(function(i) { return category(i.eventType) === "traffic"; }).length;
    var alarm   = list.filter(function(i) { return category(i.eventType) === "alarm"; }).length;
    document.getElementById("s-today").textContent   = today;
    document.getElementById("s-fire").textContent    = fire;
    document.getElementById("s-traffic").textContent = traffic;
    document.getElementById("s-alarm").textContent   = alarm;
  }

  function applyFilter() {
    var f = currentFilter;
    var out = allIncidents;
    if (f === "today")   out = allIncidents.filter(function(i) { return i.isToday; });
    if (f === "fire")    out = allIncidents.filter(function(i) { return category(i.eventType) === "fire"; });
    if (f === "medical") out = allIncidents.filter(function(i) { return category(i.eventType) === "medical"; });
    if (f === "traffic") out = allIncidents.filter(function(i) { return category(i.eventType) === "traffic"; });
    if (f === "alarm")   out = allIncidents.filter(function(i) { return category(i.eventType) === "alarm"; });
    renderList(out);
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("active"); });
    btn.classList.add("active");
    applyFilter();
  }

  async function loadIncidents() {
    var btn = document.getElementById("refresh-btn");
    btn.classList.add("spinning");
    document.getElementById("incident-list").innerHTML =
      "<div class=\"state-screen\"><div class=\"spinner\"></div><span>ACQUIRING FEED...</span></div>";
    setStatus("", "");

    try {
      var res = await fetch(WORKER_URL);
      if (!res.ok) throw new Error("HTTP " + res.status);
      var html = await res.text();
      var incidents = parseDispatchHTML(html);

      if (!incidents.length) {
        setStatus("No NPFD incidents in current feed", "warn");
        allIncidents = [];
        updateStats([]);
        renderList([]);
      } else {
        allIncidents = incidents;
        updateStats(allIncidents);
        applyFilter();
        setStatus("Live feed active -- Sarasota County 911 Dispatch -- NPFD only", "good");
        setTimeout(function() { setStatus("", ""); }, 5000);
      }

      document.getElementById("last-updated").textContent =
        "// LAST SYNC: " + new Date().toLocaleTimeString("en-US", {hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:false});

    } catch(err) {
      console.error(err);
      setStatus("Feed error: " + err.message, "error");
      document.getElementById("incident-list").innerHTML =
        "<div class=\"state-screen\"><span style=\"font-size:28px\">&#x26A0;</span><span>FEED OFFLINE -- TAP REFRESH</span></div>";
    } finally {
      btn.classList.remove("spinning");
    }
  }

  loadIncidents();
  setInterval(loadIncidents, 60000);
</script>

</body>
</html>
